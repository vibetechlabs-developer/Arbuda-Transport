{% load static %}
<link rel="stylesheet" href="{% static 'css/rate-slab-table.css' %}">
<style>
  /* Embedded styles to guarantee layouts work even if static files are not collected on production servers */
  .rate-slab-section .rate-slab-hint {
    background: #f0f7ff;
    border: 1px solid #c5ddfc;
    border-radius: 0.375rem;
    padding: 0.65rem 0.85rem;
    font-size: 0.8125rem;
    color: #384551;
    margin-bottom: 0.75rem;
  }
  .rate-slab-table-wrap {
    overflow-x: auto !important;
    display: block;
    width: 100%;
    -webkit-overflow-scrolling: touch;
    border: 1px solid #d9dee3;
    border-radius: 0.5rem;
    background: #fff;
    margin-bottom: 0.75rem;
    box-shadow: 0 1px 2px rgba(67, 89, 113, 0.06);
  }
  .rate-slab-table {
    margin-bottom: 0 !important;
    table-layout: fixed !important;
    width: 100% !important;
    min-width: 1120px !important;
  }
  .rate-slab-table thead th {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    vertical-align: middle;
    white-space: nowrap;
    padding: 0.65rem 0.5rem;
  }
  .rate-slab-table tbody td {
    vertical-align: middle;
    padding: 0.5rem 0.4rem;
  }
  .rate-slab-table .col-km { width: 95px !important; }
  .rate-slab-table .col-choice { width: 125px !important; }
  .rate-slab-table .col-value { width: 135px !important; }
  .rate-slab-table .col-diesel { width: 220px !important; }
  .rate-slab-table .col-effective { width: 155px !important; }
  .rate-slab-table .col-updated { width: 160px !important; }
  .rate-slab-table .col-history { width: 80px !important; text-align: center; }
  .rate-slab-table .col-action { width: 85px !important; text-align: center; }
  .rate-slab-table .form-control,
  .rate-slab-table .form-select {
    font-size: 0.875rem;
    min-height: 2.25rem;
    display: inline-block;
  }
  .rate-slab-table .rate-km-input {
    width: 100% !important;
    min-width: 4.5rem;
    text-align: center;
    font-weight: 500;
  }
  .rate-slab-table .rate-value-input,
  .rate-slab-table .rate-updated-value {
    width: 100% !important;
    min-width: 6.5rem;
    text-align: right;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
  }
  .rate-slab-table .rate-value-input {
    background: #fff !important;
    border-color: #d9dee3 !important;
  }
  .rate-slab-table .rate-updated-value {
    background: #e7f3ff !important;
    border-color: #9ec5fe !important;
    color: #084298 !important;
    cursor: default;
  }
  .rate-revision-active {
    line-height: 1.25;
    font-size: 0.7rem;
    white-space: normal;
  }
  .rate-slab-table .rate-effective-date {
    width: 100% !important;
    min-width: 8.5rem;
  }
  .rate-choice-group {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .rate-choice-option {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin: 0;
    font-size: 0.8125rem;
    line-height: 1.2;
    cursor: pointer;
    white-space: nowrap;
  }
  .rate-choice-option .form-check-input {
    margin-top: 0;
    flex-shrink: 0;
  }
  .diesel-adj-inline {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 0.35rem;
  }
  .diesel-adj-inline .diesel-adj-type {
    flex: 0 0 6.75rem;
    min-width: 6.75rem;
    padding-left: 0.35rem;
    padding-right: 1.5rem;
  }
  .diesel-adj-inline .diesel-adj-amount {
    flex: 1 1 auto;
    min-width: 5.5rem;
    text-align: right;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .rate-slab-table .btn-rate-history {
    white-space: nowrap;
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
  }
  .rate-slab-table .col-action .btn-danger {
    white-space: nowrap;
  }
  @media (max-width: 1200px) {
    .rate-slab-table-wrap::after {
      content: "Scroll horizontally to see all columns →";
      display: block;
      font-size: 0.7rem;
      color: #697a8d;
      text-align: right;
      padding: 0.25rem 0.5rem 0.35rem;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }
  }
</style>
