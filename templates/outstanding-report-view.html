{% extends 'masterpage.html' %}
<!-- Content -->
{% block title %}
<title>ARBUDA | Outstanding Reports </title>
{% endblock %}


{% block content %}
<style>
  mark {
    background: yellow;
    color: black;
    font-weight: bold;
    border-radius: 2px;
  }
</style>

<div class="container-xxl">
  <div class="header d-flex justify-content-between align-items-center mt-2">
    <h4 class="fw-bold py-3 mb-0"><span class="text-muted fw-light"></span>Outstanding Dispatch Report</h4>
  </div>
  <div class="authentication-wrapper authentication-basic container-p-y pt-0">
    <div class="authentication-inner w-100" style="max-width: 100%;">
      <!-- Register Card -->
      <div class="card">
        <div class="card-body">
          <form id="" class="mb-3" method="POST" action="download-report">
            {% csrf_token %}
            <!-- Flag so backend knows this is OUTSTANDING mode -->
            <input type="hidden" name="outstanding_only" value="true" />
            <h5 class="text-primary fw-semibold mb-3">Outstanding Report Details</h5>
            <div class="row">
              <div class="mb-3 col-sm-6">
                <label for="contract_no" class="form-label">Contract no.</label>
                <select class="form-select ts-select" name="contract_no" id="contract_no"
                  placeholder="Select contract no" autocomplete="off" required>
                  <option value="" disabled selected>Select contract no</option>
                  {% for contract in allcontracts %}
                  <option value="{{ contract.id }}">
                    {{ contract.company_name }} -- {{ contract.contract_no }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-3 col-sm-6">
                <label for="type_of_report" class="form-label">Select Type of Report</label>
                <select class="form-select" name="type_of_report" id="type_of_report"
                  placeholder="Select type of report" autocomplete="off" onchange="fecthproduct(this.value)">
                  <option value="" disabled selected>Select type of report</option>
                  <option value="date_wise">Dispatch Date-Wise</option>
                  <option value="product_wise">Product-Wise</option>
                </select>
              </div>

            </div>
            <!-- Date Range Fields -->
            <div id="date_range_fields" style="display:none; margin-top:10px;">
              <div class="row">
                <div class="col-sm-6">
                  <label class="form-label">From Date</label>
                  <input type="date" name="d_from_date" id="d_from_date" class="form-control">
                </div>
                <div class="col-sm-6">
                  <label class="form-label">To Date</label>
                  <input type="date" name="d_to_date" id="d_to_date" class="form-control">
                </div>
              </div>
            </div>

            <!-- Product Field -->
            <div id="product_field" style="display:none; margin-top:10px;">
              <div class="row">
                <div class="col-sm-6">
                  <label for="product_name" class="form-label">Product Name</label>
                  <select id="select-beast" name="product_name" class="form-select" placeholder="Product Name">
                  </select>
                </div>
              </div>
              <div class="row mt-3">
                <div class="col-sm-6">
                  <label class="form-label">From Date</label>
                  <input type="date" name="p_from_date" id="p_from_date" class="form-control">
                </div>
                <div class="col-sm-6">
                  <label class="form-label">To Date</label>
                  <input type="date" name="p_to_date" id="p_to_date" class="form-control">
                </div>
              </div>
            </div>

            <script>
              document.getElementById("type_of_report").addEventListener("change", function () {
                const value = this.value;

                document.getElementById("date_range_fields").style.display = (value === "date_wise") ? "block" : "none";
                document.getElementById("product_field").style.display = (value === "product_wise") ? "block" : "none";

                document.getElementById("d_from_date").required = (value === "date_wise");
                document.getElementById("d_to_date").required = (value === "date_wise");

                document.getElementById("p_from_date").required = (value === "product_wise");
                document.getElementById("p_to_date").required = (value === "product_wise");
                document.getElementsByName("product_name").required = (value === "product_wise");

                // Reinitialize TomSelect when product field becomes visible
                if (value === "product_wise") {
                  setTimeout(() => {
                    initializeProductSelect();
                    // Fetch products if contract is already selected
                    const contract_id = contractTomSelect ? contractTomSelect.getValue() : document.getElementById("contract_no").value;
                    if (contract_id) {
                      fecthproduct("product_wise");
                    }
                  }, 200);
                }

                // Refresh preview when report type changes
                setTimeout(() => {
                  fetchReportPreview();
                }, 100);
              });

              // Add event listeners for date fields to trigger preview
              document.addEventListener("DOMContentLoaded", function () {
                const dFromDate = document.getElementById("d_from_date");
                const dToDate = document.getElementById("d_to_date");
                const pFromDate = document.getElementById("p_from_date");
                const pToDate = document.getElementById("p_to_date");

                if (dFromDate) {
                  dFromDate.addEventListener("change", fetchReportPreview);
                }
                if (dToDate) {
                  dToDate.addEventListener("change", fetchReportPreview);
                }
                if (pFromDate) {
                  pFromDate.addEventListener("change", fetchReportPreview);
                }
                if (pToDate) {
                  pToDate.addEventListener("change", fetchReportPreview);
                }

                // Try to fetch preview on page load if all required fields are filled
                setTimeout(() => {
                  const contract_id = contractTomSelect ? contractTomSelect.getValue() : document.getElementById("contract_no")?.value;
                  const reportType = document.getElementById("type_of_report")?.value;

                  if (contract_id && reportType) {
                    if (reportType === "date_wise") {
                      const from = dFromDate?.value;
                      const to = dToDate?.value;
                      if (from && to) {
                        fetchReportPreview();
                      }
                    } else if (reportType === "product_wise") {
                      const productName = tomSelectInstance ? tomSelectInstance.getValue() : (document.getElementById("select-beast")?.value || "");
                      const from = pFromDate?.value;
                      const to = pToDate?.value;
                      if (productName && from && to) {
                        fetchReportPreview();
                      }
                    }
                  }
                }, 500);
              });

            </script>

            <div class="row mt-3">
              <div class="col-sm-6">
                <label class="form-label">Entries Per Page</label>
                <input type="number" name="chunk" id="chunk" class="form-control" min="1" value="12" readonly>
                <small class="text-muted">Fixed at 12 entries per page in PDF</small>
              </div>
            </div>

            <h5 class="text-primary fw-semibold mb-3 mt-3">Outstanding Dispatch Preview</h5>
            <div class="row">
              <div class="table-responsive mb-3">
                <table id="dispatchTable" class="table table-bordered ">
                  <thead>
                    <tr id="tableHeader" style="word-wrap: none;"></tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                  <tfoot>
                    <tr id="tableFooterRow"></tr>
                  </tfoot>
                </table>
              </div>
            </div>
            <div class="col-sm-8 d-flex gap-2 mt-1">
              <!-- Preview button: opens PDF in new tab (inline viewer with browser download button) -->
              <button type="submit"
                      name="export_type"
                      value="pdf"
                      class="btn btn-outline-primary flex-fill"
                      formtarget="_blank">
                Preview PDF
              </button>

              <!-- Explicit download button: same PDF but forces attachment -->
              <button type="submit"
                      name="export_type"
                      value="pdf"
                      class="btn btn-primary flex-fill"
                      onclick="this.form.insertAdjacentHTML('beforeend','<input type=&quot;hidden&quot; name=&quot;download&quot; value=&quot;1&quot; />')">
                Download PDF
              </button>

              <!-- CSV export unchanged -->
              <button type="submit"
                      name="export_type"
                      value="csv"
                      class="btn btn-outline-secondary flex-fill">
                Export Outstanding CSV
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script>
  let contractTomSelect = null;
  let tomSelectInstance = null;
  let allDispatches = []; // store fetched data globally
  let allfield;

  // Initialize contract dropdown with TomSelect and store reference
  const contractSelect = document.getElementById("contract_no");
  if (contractSelect) {
    contractTomSelect = new TomSelect(contractSelect, {
      onChange: function (value) {
        // Call onContractChange when contract changes
        onContractChange();
      }
    });
  }

  // Initialize other ts-select elements
  document.querySelectorAll('.ts-select').forEach((el) => {
    // Skip contract_no as we already initialized it
    if (el.id !== 'contract_no') {
      let settings = {};
      new TomSelect(el, settings);
    }
  });

  // Initialize TomSelect for product dropdown
  function initializeProductSelect() {
    const selectElement = document.getElementById("select-beast");
    if (!selectElement) {
      console.warn('select-beast element not found');
      return;
    }

    // Destroy existing instance if any
    if (tomSelectInstance) {
      try {
        tomSelectInstance.destroy();
      } catch (e) {
        console.warn('Error destroying TomSelect:', e);
      }
      tomSelectInstance = null;
    }

    // Create new instance
    try {
      tomSelectInstance = new TomSelect("#select-beast", {
        create: false,
        sortField: {
          field: "text",
          direction: "asc"
        },
        placeholder: "Select Product Name",
        onChange: function (value) {
          // Refresh preview when product changes
          setTimeout(() => {
            fetchReportPreview();
          }, 50);
        }
      });
      console.log('TomSelect initialized successfully');
    } catch (e) {
      console.error('Error initializing TomSelect:', e);
      tomSelectInstance = null;
    }
  }

  // Initialize when page loads (element might be hidden but that's okay)
  // Wait a bit for DOM to be ready
  setTimeout(() => {
    initializeProductSelect();
  }, 100);

</script>
<script>
  function fecthproduct(opt) {
    if (opt == "product_wise") {
      // Get contract ID from TomSelect instance or fallback to element value
      let contract_id = contractTomSelect ? contractTomSelect.getValue() : document.getElementById("contract_no").value;
      if (!contract_id) {
        // Clear products if no contract is selected
        if (tomSelectInstance) {
          tomSelectInstance.clearOptions();
        }
        return;
      }

      // Ensure TomSelect is initialized
      if (!tomSelectInstance) {
        initializeProductSelect();
      }

      fetch(`/api/get-dispacth-product?contract-id=${encodeURIComponent(contract_id)}`)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          console.log('Fetched product data:', data); // Debug log
          if (data.product_list && Array.isArray(data.product_list)) {
            updateDestinations(data.product_list);
          } else {
            console.warn('No product list in response:', data);
            if (tomSelectInstance) {
              tomSelectInstance.clearOptions();
            }
          }
        })
        .catch(err => {
          console.error('Error fetching product details:', err);
          if (tomSelectInstance) {
            tomSelectInstance.clearOptions();
          }
        });

    }
    else {
      // Clear products if not product_wise
      if (tomSelectInstance) {
        tomSelectInstance.clearOptions();
      }
      return
    }


  }

  function onContractChange() {
    // When contract changes, update products if Product-wise is selected
    const reportType = document.getElementById("type_of_report").value;
    if (reportType == "product_wise") {
      // Small delay to ensure TomSelect value is updated
      setTimeout(() => {
        fecthproduct("product_wise");
      }, 50);
    }
    // Refresh preview when contract changes
    setTimeout(() => {
      fetchReportPreview();
    }, 100);
  }

  function updateDestinations(product_list) {
    console.log('updateDestinations called with:', product_list);

    // Ensure TomSelect is initialized
    if (!tomSelectInstance) {
      console.log('Initializing TomSelect...');
      initializeProductSelect();
    }

    if (!tomSelectInstance) {
      console.error('TomSelect instance not available after initialization');
      return;
    }

    // Clear old options
    tomSelectInstance.clearOptions();
    tomSelectInstance.clear();

    // Add new options
    if (product_list && product_list.length > 0) {
      console.log('Adding', product_list.length, 'products to dropdown');
      const options = [];
      product_list.forEach(product => {
        if (product) { // Ensure product is not null/undefined
          options.push({
            value: product,
            text: product,
          });
        }
      });

      // Add all options at once
      tomSelectInstance.addOptions(options);

      // Refresh the dropdown to show new options
      tomSelectInstance.refreshOptions(false);

      console.log('Products added successfully. Options count:', tomSelectInstance.options.length);
    } else {
      console.warn('No products to add');
    }
  }

  function fetchReportPreview() {
    const contractSelectEl = document.getElementById("contract_no");
    const typeEl = document.getElementById("type_of_report");
    if (!contractSelectEl || !typeEl) return;

    const contract_id = contractTomSelect ? contractTomSelect.getValue() : contractSelectEl.value;
    const reportType = typeEl.value;

    if (!contract_id || !reportType) {
      // Clear table if we don't have enough info
      allDispatches = [];
      if (allfield && allfield.length) {
        renderTable([], allfield);
      }
      return;
    }

    let url = `/api/get-report-dispacth?contract-id=${encodeURIComponent(contract_id)}&type=${encodeURIComponent(reportType)}&outstanding=true`;

    if (reportType === "date_wise") {
      const from = document.getElementById("d_from_date").value;
      const to = document.getElementById("d_to_date").value;
      if (!from || !to) {
        return; // wait until full range
      }
      url += `&d_from_date=${encodeURIComponent(from)}&d_to_date=${encodeURIComponent(to)}`;
    } else if (reportType === "product_wise") {
      const productName = tomSelectInstance ? tomSelectInstance.getValue() : (document.getElementById("select-beast")?.value || "");
      const from = document.getElementById("p_from_date").value;
      const to = document.getElementById("p_to_date").value;
      if (!productName || !from || !to) {
        return;
      }
      url += `&product_name=${encodeURIComponent(productName)}&p_from_date=${encodeURIComponent(from)}&p_to_date=${encodeURIComponent(to)}`;
    }

    console.log('Fetching outstanding report preview from:', url);
    fetch(url)
      .then(response => {
        if (!response.ok) {
          return response.json().then(err => {
            throw new Error(err.error || `HTTP error! status: ${response.status}`);
          });
        }
        return response.json();
      })
      .then(data => {
        console.log('Outstanding report preview data received:', data);
        if (data.error) {
          console.error('API error:', data.error);
          // Clear table on error
          allDispatches = [];
          const tableHeader = document.getElementById("tableHeader");
          const tableBody = document.getElementById("tableBody");
          const tableFooterRow = document.getElementById("tableFooterRow");
          if (tableHeader) tableHeader.innerHTML = "";
          if (tableBody) tableBody.innerHTML = "";
          if (tableFooterRow) tableFooterRow.innerHTML = "";
          return;
        }

        if (data.destinations && Array.isArray(data.destinations)) {
          allDispatches = data.destinations;
          allfield = data.fields || [];
          console.log('Rendering table with', allDispatches.length, 'dispatches and', allfield.length, 'fields');
          renderTable(allDispatches, allfield);
        } else {
          console.warn('No destinations in response or invalid format');
          allDispatches = [];
          allfield = data.fields || allfield || [];
          if (allfield && allfield.length) {
            renderTable([], allfield);
          } else {
            // nothing to render yet
            const tableHeader = document.getElementById("tableHeader");
            const tableBody = document.getElementById("tableBody");
            const tableFooterRow = document.getElementById("tableFooterRow");
            if (tableHeader) tableHeader.innerHTML = "";
            if (tableBody) tableBody.innerHTML = "";
            if (tableFooterRow) tableFooterRow.innerHTML = "";
          }
        }
      })
      .catch(err => {
        console.error('Error fetching outstanding report preview:', err);
        // Clear table on error
        allDispatches = [];
        const tableHeader = document.getElementById("tableHeader");
        const tableBody = document.getElementById("tableBody");
        const tableFooterRow = document.getElementById("tableFooterRow");
        if (tableHeader) tableHeader.innerHTML = "";
        if (tableBody) tableBody.innerHTML = "";
        if (tableFooterRow) tableFooterRow.innerHTML = "";
      });
  }

  function updateProduct(product_list) {
    tomSelectInstance.clearOptions(); // remove old options
    product_list.forEach(product => {
      tomSelectInstance.addOption({
        value: product,
        text: product,
      });
    });
  }

  let currentSearch = "";

  // Optional local filter hook (kept for future use)
  function filterTable() {
    if (!allfield || !allfield.length) return;
    renderTable(allDispatches, allfield);
  }

  function isNumericValue(value) {
    if (value === null || value === undefined || value === "") return false;
    const num = parseFloat(value);
    return !isNaN(num) && isFinite(num);
  }

  function formatNumber(value) {
    return Number.isInteger(value) ? value : Number(value).toFixed(2);
  }

  // Render table similar to Client Report preview, but without checkboxes.
  function renderTable(dispatches, fields) {
    const tableHeader = document.getElementById("tableHeader");
    const tableBody = document.getElementById("tableBody");
    const tableFooterRow = document.getElementById("tableFooterRow");

    if (!tableHeader || !tableBody || !tableFooterRow) {
      console.warn("Table elements not found");
      return;
    }

    tableHeader.innerHTML = "";
    tableBody.innerHTML = "";
    tableFooterRow.innerHTML = "";

    const totals = {};
    const numericFields = new Set();

    const recordTotal = (field, rawValue) => {
      // Skip totals for non-amount text fields (party, destination, taluka, district, etc.)
      // and for date / challan / km / rate columns. We mainly total weight + money columns.
      const nonTotalFields = new Set([
        "sr_no",
        "depature_date",
        "dep_date",
        "dc_field",
        "challan_no",
        "party_name",
        "destination",
        "taluka",
        "district",
        "product_name",
        "product",
        "truck_no",
        "km",
        "rate",
      ]);
      if (nonTotalFields.has(field)) return;
      if (!isNumericValue(rawValue)) return;
      const num = parseFloat(rawValue);
      totals[field] = (totals[field] || 0) + num;
      numericFields.add(field);
    };

    // Header
    fields.forEach((field) => {
      const th = document.createElement("th");
      th.textContent = field.replace(/_/g, " ");
      th.style.whiteSpace = "nowrap";
      tableHeader.appendChild(th);
    });

    // Rows
    dispatches.forEach((dest, index) => {
      const tr = document.createElement("tr");

      fields.forEach((field) => {
        const td = document.createElement("td");
        let rawValue = dest[field];
        if (field === "sr_no") {
          rawValue = index + 1;
          td.textContent = rawValue;
        } else if (field === "depature_date" || field === "dep_date") {
          td.style.whiteSpace = "nowrap";
          rawValue = dest.dep_date || "";
          td.textContent = rawValue;
        } else if (field === "dc_field" || field === "None") {
          td.style.whiteSpace = "wrap";
          rawValue = dest.challan_no?.toString() || "";
          td.textContent = rawValue;
        } else if (field === "luggage" || field === "totalfreight") {
          rawValue = dest.totalfreight || "";
          td.textContent = rawValue;
        } else if (field === "product_name" || field === "product") {
          rawValue = dest.product_name || "";
          td.textContent = rawValue;
        } else if (field === "amount" || field === "grand_total") {
          rawValue = dest.grand_total;
          td.textContent = rawValue;
        } else if (field === "gc_note") {
          rawValue = dest.gc_note_no;
          td.textContent = rawValue;
        } else {
          rawValue = dest[field]?.toString() || "";
          td.textContent = rawValue;
        }
        if (field !== "sr_no") {
          recordTotal(field, rawValue);
        }
        tr.appendChild(td);
      });

      tableBody.appendChild(tr);
    });

    // Footer totals row (same column count as header/body)
    // "TOTAL" label should always appear under SR NO (first column),
    // and numeric totals under numeric columns only.
    fields.forEach((field, index) => {
      const td = document.createElement("td");
      if (index === 0) {
        td.textContent = "TOTAL";
        td.style.fontWeight = "bold";
      } else if (numericFields.has(field)) {
        const totalValue = totals[field] || 0;
        td.textContent = formatNumber(totalValue);
        td.style.fontWeight = "bold";
      } else {
        td.textContent = "";
      }
      tableFooterRow.appendChild(td);
    });
  }
</script>

{% endblock %}
